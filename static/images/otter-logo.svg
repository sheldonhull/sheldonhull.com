<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Top Hat -->
  <g id="top-hat">
    <!-- Hat brim -->
    <ellipse cx="50" cy="32" rx="22" ry="4" fill="#2c2c2c"/>
    <!-- Hat body -->
    <rect x="38" y="15" width="24" height="17" rx="2" fill="#2c2c2c"/>
    <!-- Hat band -->
    <rect x="38" y="28" width="24" height="3" fill="#8b4513"/>
  </g>

  <!-- Otter Head -->
  <g id="otter-head">
    <!-- Main head -->
    <ellipse cx="50" cy="50" rx="18" ry="20" fill="#8b6f47"/>

    <!-- Ears -->
    <ellipse cx="38" cy="38" rx="5" ry="6" fill="#7a5c3a"/>
    <ellipse cx="62" cy="38" rx="5" ry="6" fill="#7a5c3a"/>

    <!-- Face highlight -->
    <ellipse cx="50" cy="55" rx="14" ry="12" fill="#c4a574"/>

    <!-- Eyes -->
    <circle cx="44" cy="48" r="3" fill="#2c2c2c"/>
    <circle cx="56" cy="48" r="3" fill="#2c2c2c"/>
    <!-- Eye highlights -->
    <circle cx="45" cy="47" r="1" fill="#ffffff"/>
    <circle cx="57" cy="47" r="1" fill="#ffffff"/>

    <!-- Nose -->
    <ellipse cx="50" cy="56" rx="3" ry="2.5" fill="#2c2c2c"/>

    <!-- Whisker dots -->
    <circle cx="38" cy="52" r="1" fill="#2c2c2c"/>
    <circle cx="62" cy="52" r="1" fill="#2c2c2c"/>
    <circle cx="38" cy="55" r="1" fill="#2c2c2c"/>
    <circle cx="62" cy="55" r="1" fill="#2c2c2c"/>

    <!-- Whiskers -->
    <line x1="38" y1="52" x2="28" y2="50" stroke="#2c2c2c" stroke-width="0.5"/>
    <line x1="38" y1="55" x2="28" y2="56" stroke="#2c2c2c" stroke-width="0.5"/>
    <line x1="62" y1="52" x2="72" y2="50" stroke="#2c2c2c" stroke-width="0.5"/>
    <line x1="62" y1="55" x2="72" y2="56" stroke="#2c2c2c" stroke-width="0.5"/>

    <!-- Mouth -->
    <path d="M 47 58 Q 50 60 53 58" stroke="#2c2c2c" stroke-width="1" fill="none"/>
  </g>

  <!-- Body/Shoulders hint -->
  <g id="body">
    <ellipse cx="50" cy="78" rx="16" ry="12" fill="#8b6f47"/>
    <ellipse cx="50" cy="78" rx="12" ry="9" fill="#c4a574"/>
  </g>
</svg>
