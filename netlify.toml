###############################
# PUBLISH/PUBLIC
###############################
[build]
# Skip builds for Renovate bot commits and commits with [skip ci] in message
# Exit code 0 = skip build, Exit code 1 = proceed with build
ignore = "git log -1 --pretty=%B | grep -qiE '(renovate|\\[skip ci\\])'"
command = '''
curl -sSfL https://raw.githubusercontent.com/aquaproj/aqua-installer/v3.1.2/aqua-installer | bash -s -- -v v2.43.1
export PATH="${AQUA_ROOT_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/aquaproj-aqua}/bin:${PATH}"
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
aqua policy allow .aqua/aqua-policy.yaml
aqua install --tags first
aqua install --tags ci
task init
task build
'''
publish = ".artifacts/public"


[build.environment]
NODE_VERSION = "22"
AQUA_LOG_LEVEL = "info"
###############################
# DEPLOY PREVIEWS
###############################
[context.deploy-preview]
command = '''
curl -sSfL https://raw.githubusercontent.com/aquaproj/aqua-installer/v3.1.2/aqua-installer | bash -s -- -v v2.43.1
export PATH="${AQUA_ROOT_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/aquaproj-aqua}/bin:${PATH}"
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
aqua policy allow .aqua/aqua-policy.yaml
aqua install --tags first
aqua install --tags ci
task init
task build
'''
publish = ".artifacts/public"

[context.deploy-preview.environment]

###############################
# BRANCH
###############################
[context.branch-deploy]
publish = ".artifacts/public"
command = '''
curl -sSfL https://raw.githubusercontent.com/aquaproj/aqua-installer/v3.1.2/aqua-installer | bash -s -- -v v2.43.1
export PATH="${AQUA_ROOT_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/aquaproj-aqua}/bin:${PATH}"
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
aqua policy allow .aqua/aqua-policy.yaml
aqua install --tags first
aqua install --tags ci
task init
task build
'''

[context.branch-deploy.environment]

# Redirects to keep jekyll based urls that some use like:
#xmlUrl="https://www.sheldonhull.com/tags/tech/feed.xml"  should still be working, since hugo generates with index.xml
[[redirects]]
from = "/feed.xml"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/feed"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/*/feed.xml"
to = "/:splat/index.xml"
status = 200
force = true

[[redirects]]
from = "/rss"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/blog/*"
to = "/:splat"
status = 301
force = true

[[redirects]]
from = "/microblog/*"
to = "/:splat"
status = 301
force = true

[[redirects]]
from = "/microblog/"
to = "/posts/"
status = 301
force = true

