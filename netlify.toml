###############################
# PUBLISH/PUBLIC
###############################
[build]
# Skip builds for Renovate bot commits and commits with [skip ci] in message
# Exit code 0 = skip build, Exit code 1 = proceed with build
ignore = "git log -1 --pretty=%B | grep -qiE '(renovate|\\[skip ci\\])'"
command = '''
curl https://mise.run | sh
export PATH="$HOME/.local/bin:$PATH"
mise install -y
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
mise exec -- task init
mise exec -- task build
'''
publish = ".artifacts/public"


[build.environment]
NODE_VERSION = "22"
###############################
# DEPLOY PREVIEWS
###############################
[context.deploy-preview]
command = '''
curl https://mise.run | sh
export PATH="$HOME/.local/bin:$PATH"
mise install -y
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
mise exec -- task init
mise exec -- task build
'''
publish = ".artifacts/public"

[context.deploy-preview.environment]

###############################
# BRANCH
###############################
[context.branch-deploy]
publish = ".artifacts/public"
command = '''
curl https://mise.run | sh
export PATH="$HOME/.local/bin:$PATH"
mise install -y
export VOLTA_HOME="$HOME/.volta"
export PATH="$VOLTA_HOME/bin:$PATH"
mise exec -- task init
mise exec -- task build
'''

[context.branch-deploy.environment]

# Redirects to keep legacy URLs working
[[redirects]]
from = "/feed.xml"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/feed"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/*/feed.xml"
to = "/:splat/index.xml"
status = 200
force = true

[[redirects]]
from = "/rss"
to = "/index.xml"
status = 200
force = true

[[redirects]]
from = "/blog/*"
to = "/:splat"
status = 301
force = true

[[redirects]]
from = "/microblog/*"
to = "/:splat"
status = 301
force = true

[[redirects]]
from = "/microblog/"
to = "/posts/"
status = 301
force = true
